<!DOCTYPE html>
<html>

<head>

    <title>Signup</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="login-box">

        <h2>Admin Signup</h2>

        <form id="signupForm">

            <input
            type="text"
            id="signupUsername"
            placeholder="Username"
            required>

            <input
            type="email"
            placeholder="Email"
            required>

            <input
            type="password"
            id="signupPassword"
            placeholder="Password"
            required>

            <button type="submit">

                Sign Up

            </button>

        </form>

        <p style="text-align:center; margin-top:15px;">

            Already have an account?

            <a href="index.html">

                Login

            </a>

        </p>

    </div>

</div>


<script>

let signupForm =
document.getElementById("signupForm");

signupForm.addEventListener(
"submit",
function(event){

    event.preventDefault();

    let username =
    document.getElementById(
        "signupUsername"
    ).value;

    let password =
    document.getElementById(
        "signupPassword"
    ).value;


    let users =

    JSON.parse(
        localStorage.getItem("users")
    ) || [];


    let user = {

        username,
        password

    };

    users.push(user);

    localStorage.setItem(

        "users",

        JSON.stringify(users)

    );

    alert("Signup Successful");

    window.location.href =
    "index.html";

});

</script>

</body>

</html>

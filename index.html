<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="login-box">

        <h2>Admin Login</h2>

        <form id="loginForm">

            <input
            type="text"
            id="loginUsername"
            placeholder="Username"
            required>

            <input
            type="password"
            id="loginPassword"
            placeholder="Password"
            required>

            <button type="submit">

                Login

            </button>

        </form>

        <p style="text-align:center; margin-top:15px;">

            Don't have an account?

            <a href="Signup.html">

                Signup

            </a>

        </p>

    </div>

</div>


<script>

let loginForm =
document.getElementById("loginForm");

loginForm.addEventListener(
"submit",
function(event){

    event.preventDefault();

    let username =
    document.getElementById(
        "loginUsername"
    ).value;

    let password =
    document.getElementById(
        "loginPassword"
    ).value;


    let users =

    JSON.parse(
        localStorage.getItem("users")
    ) || [];


    let validUser = users.find(

        user =>

        user.username === username &&

        user.password === password

    );


    if(validUser){

        alert("Login Successful");

        window.location.href =
        "dashboard.html";

    }else{

        alert(
            "Invalid Username or Password"
        );

    }

});

</script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>

    <title>Add Student</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="login-box">

        <h2>Add Student</h2>

        <form id="studentForm">

            <input
            type="text"
            id="studentName"
            placeholder="Student Name"
            required>

            <input
            type="text"
            id="course"
            placeholder="Course"
            required>

            <input
            type="number"
            id="semester"
            placeholder="Semester"
            required>

            <button type="submit">
                Add Student
            </button>

        </form>

        <br>

        <a href="dashboard.html">

            <button>
                Back to Dashboard
            </button>

        </a>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>

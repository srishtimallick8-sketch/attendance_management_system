<!DOCTYPE html>
<html>

<head>

    <title>Update Student</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="login-box">

        <h2>Update Student</h2>

        <form id="updateForm">

            <input
            type="text"
            id="updateName"
            placeholder="Student Name"
            required>

            <input
            type="text"
            id="updateCourse"
            placeholder="Course"
            required>

            <input
            type="number"
            id="updateSemester"
            placeholder="Semester"
            required>

            <button type="submit">
                Save Changes
            </button>

        </form>

        <br>

        <a href="manage.html">

            <button>
                Back
            </button>

        </a>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
